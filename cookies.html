<!doctype html>
<html lang="en">
  <head>
    <title>BiteMe Cookies</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="style.css" type="text/css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-light fixed-top bg-white border-bottom" id="navbar">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand fw-semibold" href="#">BiteMe Cookies</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarcollapse"
          aria-controls="navbarcollapse"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarcollapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link active" href="cookies.html">Cookies</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">
                Cart <span id="cartCountBadge" class="badge text-bg-dark ms-1">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Page content (push down because navbar is fixed-top) -->
    <main class="container py-4" style="margin-top: 80px;">
      <div class="row g-4">
        <!-- LEFT: product list -->
        <div class="col-12 col-lg-8">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="h3 mb-0">Products</h1>
            <span class="text-muted small">Tap a button to add to cart</span>
          </div>

          <div class="vstack gap-3">

            <div class="card shadow-sm rounded-4">
              <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Kinder Egg</div>
                  <div class="text-muted small">$2.00</div>
                </div>
                <button
                  class="btn btn-primary add-to-cart"
                  data-id="kinder-egg"
                  data-name="Kinder Egg"
                  data-price="2"
                  type="button"
                >
                  Add to cart
                </button>
              </div>
            </div>

            <div class="card shadow-sm rounded-4">
              <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Cookie Monster</div>
                  <div class="text-muted small">$2.00</div>
                </div>
                <button
                  class="btn btn-primary add-to-cart"
                  data-id="cookie-monster"
                  data-name="Cookie Monster"
                  data-price="2"
                  type="button"
                >
                  Add to cart
                </button>
              </div>
            </div>

            <div class="card shadow-sm rounded-4">
              <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Fruity Pebble</div>
                  <div class="text-muted small">$2.00</div>
                </div>
                <button
                  class="btn btn-primary add-to-cart"
                  data-id="fruity-pebble"
                  data-name="Fruity Pebble"
                  data-price="2"
                  type="button"
                >
                  Add to cart
                </button>
              </div>
            </div>

            <div class="card shadow-sm rounded-4">
              <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Cookies &amp; Cream</div>
                  <div class="text-muted small">$2.00</div>
                </div>
                <button
                  class="btn btn-primary add-to-cart"
                  data-id="cookies-cream"
                  data-name="Cookies & Cream"
                  data-price="2"
                  type="button"
                >
                  Add to cart
                </button>
              </div>
            </div>

            <div class="card shadow-sm rounded-4">
              <div class="card-body d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Chocolate Swirl (Crunch &amp; KitKat)</div>
                  <div class="text-muted small">$2.00</div>
                </div>
                <button
                  class="btn btn-primary add-to-cart"
                  data-id="chocolate-swirl"
                  data-name="Chocolate Swirl (Crunch & KitKat)"
                  data-price="2"
                  type="button"
                >
                  Add to cart
                </button>
              </div>
            </div>

          </div>
        </div>

        <!-- RIGHT: optional space for 2 images -->
        <div class="col-12 col-lg-4">
          <div class="card shadow-sm rounded-4">
            <div class="card-body">
              <h2 class="h6 text-muted mb-3">Images</h2>

              <div class="d-grid gap-3">
                <!-- Replace these with <img src="..."> later -->
                <div class="border rounded-4 bg-white d-flex align-items-center justify-content-center text-muted"
                     style="height: 200px;">
                  Image Slot 1
                </div>
                <div class="border rounded-4 bg-white d-flex align-items-center justify-content-center text-muted"
                     style="height: 200px;">
                  Image Slot 2
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <!-- JS libraries at end of body (best practice) -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.js"></script>

    <!-- Your cart script -->
    <script src="script.js" defer></script>
  </body>
</html>
