<!doctype html>
<html lang="en">
<head>
  <title>BiteMe Cookies - Cart</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css" type="text/css" />
  <script src="script.js" type="text/javascript" defer></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</head>

<body>
  <!-- YOUR NAV (same as your pages) -->
  <nav class="navbar navbar-expand-md navbar-light fixed-top" id="navbar">
    <div class="container px-4 px-lg-5">
      <a class="navbar-brand" href="">BiteMe Cookies</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarcollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarcollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="cookies.html">Cookies</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="container" style="padding-top: 95px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="h3 m-0">Your Cart</h1>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-dark" id="cartCountBadge">0 items</span>
        <button class="btn btn-outline-danger btn-sm" id="clearCartBtn" type="button">Clear</button>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-body" id="cartItemsArea">
            <!-- JS renders cart items here -->
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <h2 class="h5">Order Summary</h2>
            <div class="d-flex justify-content-between">
              <span>Subtotal</span>
              <strong id="subtotalText">$0.00</strong>
            </div>
            <div class="d-flex justify-content-between">
              <span>Tax</span>
              <strong id="taxText">$0.00</strong>
            </div>
            <hr>
            <div class="d-flex justify-content-between fs-5">
              <span>Total</span>
              <strong id="totalText">$0.00</strong>
            </div>

            <button class="btn btn-dark w-100 mt-3" id="checkoutBtn" type="button">
              Checkout
            </button>

          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
